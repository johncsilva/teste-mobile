name: Android cross-compile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK r27c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Cache opencv-mobile (Android prebuilt)
        uses: actions/cache@v4
        with:
          path: android/vendor/opencv-mobile-4.13.0-android
          key: opencv-mobile-android-4.13.0

      - name: Cache libomp.a (LLVM 19 OpenMP runtime)
        uses: actions/cache@v4
        with:
          path: android/vendor/libomp
          key: libomp-llvm19-arm64-v8a-v1

      - name: Build libomr.so (arm64-v8a)
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd android
          ./build.sh arm64-v8a

      - name: Verificar tamanho da .so
        run: |
          ls -la build-android-arm64-v8a/libomr.so
          SIZE_KB=$(stat -c '%s' build-android-arm64-v8a/libomr.so)
          SIZE_KB=$((SIZE_KB / 1024))
          echo "libomr.so = ${SIZE_KB} KB"
          if [ "$SIZE_KB" -gt 7168 ]; then
            echo "::warning::libomr.so cresceu para ${SIZE_KB} KB (threshold 7168)"
          fi

      - name: Upload libomr.so (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: libomr-arm64-v8a
          path: build-android-arm64-v8a/libomr.so
          retention-days: 14

  build-apk:
    runs-on: ubuntu-latest
    needs: build-arm64
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download libomr.so
        uses: actions/download-artifact@v4
        with:
          name: libomr-arm64-v8a
          path: build-android-arm64-v8a

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle build (assembleDebug)
        working-directory: android/demo-app
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK debug
        uses: actions/upload-artifact@v4
        with:
          name: omr-demo-debug.apk
          path: android/demo-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
