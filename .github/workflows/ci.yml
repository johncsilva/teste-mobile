name: CI (Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenCV + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libopencv-dev cmake build-essential

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Benchmark — 100% em sinteticos (7 variantes)
        # O adapter Python traduz templates v0 (OMRChecker) para v1 (motor C++)
        # no voo e cobre todas as 7 variantes. Substitui smoke test direto do
        # binario, que falharia porque o repo so versiona templates v0.
        run: |
          cd benchmark
          python3 run_validation.py --detector cpp-omr --subset synthetic

      - name: Benchmark — perturbados (rotacao + ruido + perspectiva)
        run: |
          cd benchmark
          python3 run_validation.py --detector cpp-omr --subset perturbed
